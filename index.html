<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Routinely">
<meta name="theme-color" content="#F2F2F7">
<title>Routinely</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--p:#5B4FD4;--p2:#7C6EE8;--pl:#EEF2FF;--g:#22C55E;--o:#F59E0B;--ol:#FFFBEB;--r:#EF4444;--rl:#FEF2F2;--bg:#F2F2F7;--card:#fff;--sep:#E5E5EA;--sep2:#F4F4F8;--t1:#111827;--t2:#6B7280;--t3:#9CA3AF}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.scr{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.scr.on{display:flex}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
#nav{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid var(--sep);display:flex;flex-shrink:0;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--t3);border:none;background:none;cursor:pointer;padding:4px 0}
.ni.on{color:var(--p)}
.hdr{background:var(--card);padding:calc(16px + env(safe-area-inset-top,0px)) 20px 14px;border-bottom:1px solid var(--sep);flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end}
.hdr h1{font-size:30px;font-weight:800;letter-spacing:-.5px}
.hdr-sub{font-size:14px;color:var(--t2);margin-top:3px}
.sub-hdr{background:var(--card);border-bottom:1px solid var(--sep);flex-shrink:0;padding:calc(10px + env(safe-area-inset-top,0px)) 20px 0}
.back-row{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px}
.back-btn{background:none;border:none;color:var(--p);font-size:15px;font-weight:500;display:flex;align-items:center;gap:3px;cursor:pointer}
.scr-title{font-size:28px;font-weight:800;letter-spacing:-.4px;padding-bottom:14px}
.sum{display:flex;gap:8px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--sep)}
.sc{flex:1;background:var(--bg);border-radius:12px;padding:10px 6px;text-align:center}
.sv{font-size:20px;font-weight:700;letter-spacing:-.2px}
.sl{font-size:10px;color:var(--t3);margin-top:2px;font-weight:500}
.dspill{display:inline-flex;align-items:center;gap:5px;background:var(--ol);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;color:#92400E}
.sec{font-size:11px;font-weight:700;color:var(--t3);padding:24px 20px 10px;text-transform:uppercase;letter-spacing:.8px}
/* iOS grouped list boxes */
.list-box{background:var(--card);border-radius:16px;margin:0 16px 16px;overflow:hidden;transform:translateZ(0)}
.list-box>div:not(:last-child){border-bottom:1px solid var(--sep2)}
/* Habit rows */
.row{display:flex;align-items:center;gap:12px;padding:13px 20px;background:transparent;cursor:pointer;transition:background .1s}
.row:active{background:#f9f9fb}
.hico{border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hinfo{flex:1;min-width:0}
.htitle{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.hsub{font-size:13px;color:var(--t2);margin-top:3px}
.sw{display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0}
.sf{font-size:20px;line-height:1}
.sn{font-size:14px;font-weight:700;line-height:1.2}
.su{font-size:9px;color:var(--t3);font-weight:500}
.db{width:38px;height:38px;border-radius:50%;border:2px solid var(--sep);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.db.done{background:var(--g);border-color:var(--g)}
.db:active{transform:scale(.88)}
.wstrip{display:flex;gap:3px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--sep)}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wl{font-size:10px;color:var(--t3);font-weight:600}
.dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.d-done{background:var(--g);color:#fff}
.d-miss{background:var(--rl);color:var(--r)}
.d-pend{background:var(--ol);color:var(--o)}
.d-none{background:var(--sep);color:var(--t3)}
.d-today{box-shadow:0 0 0 2.5px var(--p),0 0 0 4px rgba(91,79,212,.12)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--sep)}
.sb{background:var(--bg);border-radius:14px;padding:15px 13px}
.sbv{font-size:24px;font-weight:800;letter-spacing:-.4px}
.sbl{font-size:12px;color:var(--t2);margin-top:3px}
.gbar-wrap{padding:15px 20px;background:var(--card);border-bottom:1px solid var(--sep)}
.gbar-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.gbar-hdr span:first-child{font-size:15px;font-weight:600}
.gbar-hdr span:last-child{font-size:13px;color:var(--t2)}
.gbar{height:10px;background:var(--sep2);border-radius:6px;overflow:hidden}
.gfill{height:100%;background:linear-gradient(90deg,var(--p),var(--p2));border-radius:6px;transition:width .5s}
.det-hero{padding:22px 20px 18px;border-bottom:1px solid var(--sep)}
.det-sched{font-size:14px;color:var(--p);font-weight:500;margin-top:4px}
.miss-section{padding:14px 20px;background:transparent;border-top:1px solid var(--sep2)}
.miss-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.miss-hdr-title{font-size:13px;font-weight:600;color:var(--t2)}
.manage-btn{background:none;border:none;color:var(--p);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{font-size:13px;padding:7px 16px;border-radius:20px;border:1.5px solid var(--sep);cursor:pointer;background:var(--card);color:var(--t1);font-weight:500;transition:all .15s}
.chip.on{background:var(--pl);color:var(--p);border-color:var(--p)}
.note-inp{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid var(--sep);font-size:14px;color:var(--t1);outline:none;background:#fafafa;font-family:inherit;margin-bottom:10px}
.note-inp:focus{border-color:var(--p)}
.save-r-btn{padding:10px 20px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.orow{display:flex;align-items:center;gap:14px;padding:15px 20px;background:transparent;cursor:pointer;transition:background .1s}
.orow:active{background:#f9f9fb}
.orow-text{flex:1;font-size:16px;font-weight:500}
/* Form */
.fsec-hdr{font-size:12px;font-weight:700;color:var(--t3);padding:20px 20px 7px;text-transform:uppercase;letter-spacing:.8px}
.fcard{background:var(--card);margin:0 16px;border-radius:16px;overflow:hidden}
.frow{display:flex;align-items:center;gap:12px;padding:0 18px;min-height:52px;border-bottom:.5px solid var(--sep2)}
.frow:last-child{border-bottom:none}
.frow-lbl{font-size:16px;font-weight:500;color:var(--t1);flex:1;white-space:nowrap}
.frow-lbl-sm{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.frow-title{padding:15px 18px;border-bottom:.5px solid var(--sep2)}
.fr-inp-full{width:100%;background:none;border:none;font-size:17px;color:var(--t1);outline:none;font-family:inherit;padding:5px 0 2px}
.fr-inp-full::placeholder{color:var(--t3)}
.fr-inp-r{background:none;border:none;font-size:16px;color:var(--t2);text-align:right;flex:1;min-width:0;outline:none;font-family:inherit}
.fr-inp-r:focus{color:var(--t1)}
.fr-inp-r::placeholder{color:var(--t3)}
.fr-sel{appearance:none;-webkit-appearance:none;background:none;border:none;font-size:16px;color:var(--p);text-align:right;outline:none;font-family:inherit;cursor:pointer}
/* Drum picker */
.picker-outer{margin:0 16px;border-radius:16px;overflow:hidden;background:var(--card)}
.picker-wrap{position:relative;height:220px;display:flex;align-items:center;padding:0 20px;overflow:hidden}
.picker-sel{position:absolute;left:16px;right:16px;top:50%;transform:translateY(-22px);height:44px;background:var(--bg);border-radius:12px;pointer-events:none;z-index:1}
.picker-ft{position:absolute;left:0;right:0;height:88px;pointer-events:none;z-index:2}
.picker-ft-t{top:0;background:linear-gradient(to bottom,var(--card) 30%,transparent)}
.picker-ft-b{bottom:0;background:linear-gradient(to top,var(--card) 30%,transparent)}
.pcol{flex:2;height:220px;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;position:relative;z-index:3}
.pcol::-webkit-scrollbar{display:none}
.pi{height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:400;color:var(--t3);scroll-snap-align:center;user-select:none;transition:font-size .12s,color .12s,font-weight .12s}
.pi.sel{font-size:22px;font-weight:700;color:var(--t1)}
.picker-unit{font-size:15px;font-weight:600;color:var(--t2);flex:1;text-align:center;position:relative;z-index:3;pointer-events:none}
.picker-hint{font-size:12px;color:var(--t3);text-align:center;padding:10px 16px 14px}
.goal-inp-wrap{display:flex;align-items:center;gap:6px}
.goal-inp{background:none;border:none;font-size:17px;font-weight:600;color:var(--t1);text-align:right;width:60px;outline:none;font-family:inherit}
.goal-inp::placeholder{color:var(--t3);font-weight:400;font-size:16px}
.goal-unit{font-size:13px;color:var(--t2);white-space:nowrap}
.tog{width:50px;height:30px;border-radius:15px;background:var(--sep);cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.tog.on{background:var(--g)}
.tog::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 5px rgba(0,0,0,.22)}
.tog.on::after{transform:translateX(20px)}
.tog-sub{font-size:12px;color:var(--t3);margin-top:1px}
.fdrow{display:flex;gap:6px;flex-wrap:wrap;padding:12px 18px;border-top:.5px solid var(--sep2)}
.dtog{width:40px;height:40px;border-radius:50%;border:2px solid var(--sep);background:var(--card);cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.dtog.on{background:var(--p);color:#fff;border-color:var(--p)}
.btn{width:calc(100% - 32px);margin:10px 16px;padding:16px;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.1px}
.btn:active{opacity:.8}
.btn-p{background:var(--p);color:#fff}
.btn-r{background:var(--rl);color:var(--r)}
/* Insights */
.rpills{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--sep);scrollbar-width:none}
.rpills::-webkit-scrollbar{display:none}
.rp{padding:7px 16px;border-radius:20px;border:1.5px solid var(--sep);font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;background:var(--card);transition:all .15s;font-family:inherit}
.rp.on{background:var(--p);color:#fff;border-color:var(--p)}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}
.cc{background:var(--bg);border-radius:14px;padding:14px 12px}
.cv{font-size:22px;font-weight:800;letter-spacing:-.4px}
.cl{font-size:11px;color:var(--t2);margin-top:2px}
.cd{font-size:12px;margin-top:5px;font-weight:600}
.pos{color:var(--g)}.neg{color:var(--r)}
.bchart{padding:2px 16px 12px}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bl{font-size:12px;color:var(--t2);width:78px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt{flex:1;height:24px;background:var(--sep2);border-radius:8px;overflow:hidden}
.bf{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:#fff;min-width:10px}
.bf-p{background:linear-gradient(90deg,#7C6EE8,#5B4FD4)}.bf-t{background:linear-gradient(90deg,#34D399,#059669)}.bf-c{background:linear-gradient(90deg,#F87171,#DC2626)}
.rr{display:flex;align-items:center;gap:12px;padding:13px 20px;background:transparent}
.rn{width:24px;font-size:14px;font-weight:800;color:var(--t3);text-align:center;flex-shrink:0}
.rname{font-size:15px;font-weight:600}
.rsub{font-size:12px;color:var(--t2);margin-top:2px}
.mr{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--sep)}
.ml{flex:1;font-size:16px;font-weight:500}
.mtag{font-size:11px;color:var(--t3);margin-left:4px}
.ib{background:none;border:none;cursor:pointer;padding:7px;display:flex;align-items:center;border-radius:8px}
.ib:active{background:var(--bg)}
.empty{text-align:center;padding:72px 32px}
.ei{font-size:52px;margin-bottom:14px}
.empty h3{font-size:21px;font-weight:700;margin-bottom:8px}
.empty p{font-size:15px;color:var(--t2);line-height:1.6}
/* Swipe rows */
.swrow{position:relative;overflow:hidden;background:transparent;user-select:none;-webkit-user-select:none}
.swrow-del{position:absolute;right:0;top:0;bottom:0;width:86px;background:var(--r);color:#fff;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:700;font-family:inherit;letter-spacing:.2px}
.swrow-inner{will-change:transform;background:var(--card)}
.edit-ico-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--sep);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s}
.edit-ico-btn:active{background:var(--bg)}
#fab{position:fixed;right:20px;bottom:calc(80px + env(safe-area-inset-bottom,0px) + 10px);width:58px;height:58px;background:var(--p);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(91,79,212,.45);z-index:100;transition:transform .15s}
#fab:active{transform:scale(.91)}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div class="scr" id="s-today">
    <div class="hdr"><div class="hdr-row"><div><h1>Today</h1><div class="hdr-sub" id="t-date"></div></div><div id="t-ds"></div></div></div>
    <div class="body"><div class="sum" id="t-sum"></div><div id="t-habits"></div><div id="t-tasks"></div></div>
  </div>
  <div class="scr" id="s-habits">
    <div class="hdr"><div class="hdr-row"><h1>All Habits</h1><button id="btn-new-h" style="background:none;border:none;color:var(--p);font-size:15px;font-weight:600;cursor:pointer">+ New</button></div></div>
    <div class="body" id="s-habits-body"></div>
  </div>
  <div class="scr" id="s-detail">
    <div class="sub-hdr">
      <div class="back-row">
        <button class="back-btn" id="detail-back-btn"></button>
        <button id="detail-edit-btn" style="background:none;border:none;color:var(--p);font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px"></button>
      </div>
      <div class="scr-title" id="d-hdr-title"></div>
    </div>
    <div class="body" id="s-detail-body"></div>
  </div>
  <div class="scr" id="s-form">
    <div class="sub-hdr">
      <div class="back-row">
        <button class="back-btn" id="form-back-btn"></button>
        <button onclick="saveForm()" style="background:none;border:none;color:var(--p);font-size:16px;font-weight:600;cursor:pointer">Save</button>
      </div>
      <div class="scr-title" id="form-title">New habit</div>
    </div>
    <div class="body" id="form-body"></div>
  </div>
  <div class="scr" id="s-insights">
    <div class="hdr"><h1>Insights</h1></div>
    <div class="body" id="s-insights-body"></div>
  </div>
  <div class="scr" id="s-cats">
    <div class="sub-hdr">
      <div class="back-row"><button class="back-btn" id="cats-back-btn"></button></div>
      <div class="scr-title">Miss categories</div>
    </div>
    <div class="body">
      <div id="cats-list"></div>
      <div style="display:flex;gap:8px;padding:14px 16px;background:var(--card);margin:10px 0">
        <input id="new-cat" type="text" placeholder="New category…" style="flex:1;padding:12px 16px;border-radius:14px;border:1.5px solid var(--sep);font-size:15px;color:var(--t1);outline:none;font-family:inherit">
        <button onclick="addCat()" style="padding:12px 20px;background:var(--p);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">Add</button>
      </div>
      <p style="padding:0 20px;font-size:13px;color:var(--t3)">Default categories can be renamed but not deleted.</p>
    </div>
  </div>
  <button id="fab"></button>
  <nav id="nav">
    <button class="ni on" id="ni-today" onclick="go('today')"><span id="ni-t-i"></span><span>Today</span></button>
    <button class="ni" id="ni-habits" onclick="go('habits')"><span id="ni-h-i"></span><span>Habits</span></button>
    <button class="ni" id="ni-insights" onclick="go('insights')"><span id="ni-ins-i"></span><span>Insights</span></button>
  </nav>
</div>
<script>
// ── ICONS ────────────────────────────────────────────────
var IX={
  home:'<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9,22 9,12 15,12 15,22" stroke-linecap="round" stroke-linejoin="round"/>',
  list:'<line x1="9" y1="6" x2="21" y2="6" stroke-linecap="round"/><line x1="9" y1="12" x2="21" y2="12" stroke-linecap="round"/><line x1="9" y1="18" x2="21" y2="18" stroke-linecap="round"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/>',
  chart:'<line x1="18" y1="20" x2="18" y2="10" stroke-linecap="round" stroke-width="2.5"/><line x1="12" y1="20" x2="12" y2="4" stroke-linecap="round" stroke-width="2.5"/><line x1="6" y1="20" x2="6" y2="14" stroke-linecap="round" stroke-width="2.5"/><line x1="2" y1="20" x2="22" y2="20" stroke-linecap="round"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19" stroke-linecap="round" stroke-width="2.5"/><line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round" stroke-width="2.5"/>',
  back:'<polyline points="15,18 9,12 15,6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"/>',
  check:'<polyline points="20,6 9,17 4,12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.8" stroke="white"/>',
  edit:'<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke-linecap="round" stroke-linejoin="round"/>',

// ── DATE UTILS ───────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
function today(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(s,n){var d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function daysAgo(n){return addDays(today(),-n)+'T00:00:00Z';}
function dname(s){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(s+'T12:00:00').getDay()];}
function wsat(s){var d=new Date(s+'T12:00:00'),dow=d.getDay(),diff=(dow+1)%7;d.setDate(d.getDate()-diff);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function wdays(sat){var a=[];for(var i=0;i<7;i++)a.push(addDays(sat,i));return a;}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmtDur(m){if(!m)return'—';var h=Math.floor(m/60),r=m%60;return h?(r?h+'h '+r+'m':h+'h'):r+'m';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── LOGIC ────────────────────────────────────────────────
function req(h,d){
  if(h.arc)return false;
  if(d<(h.at||'').slice(0,10))return false;
  if(h.type==='daily')return true;
  if(h.type==='fixed')return(h.days||[]).indexOf(dname(d))>=0;
  if(h.type==='weekly')return dname(d)===h.wday;
  if(h.type==='oneTime')return d===h.due;
  return false;
}
function isDone(hid,d){return S.done.some(function(c){return c.hid===hid&&c.date===d;});}
function status(h,d){
  if(isDone(h.id,d))return'done';
  if(!req(h,d))return'none';
  var t=today();if(d>t)return'future';if(d===t)return'pending';return'missed';
}
function streak(h){
  if(h.type==='oneTime')return null;
  var t=today(),c0=(h.at||'2000-01-01').slice(0,10);
  if(h.type==='daily'){var s=isDone(h.id,t)?1:0,d=addDays(t,-1);while(d>=c0&&s<9999){if(isDone(h.id,d))s++;else break;d=addDays(d,-1);}return{v:s,u:'days'};}
  if(h.type==='fixed'){var s=0;if(req(h,t)&&isDone(h.id,t))s++;var d=addDays(t,-1);while(d>=c0&&s<9999){if(req(h,d)){if(isDone(h.id,d))s++;else break;}d=addDays(d,-1);}return{v:s,u:'times'};}
  if(h.type==='weekly'){var s=0,sat=wsat(t),sat0=wsat(c0),i=0;while(sat>=sat0&&i++<500){var ww=wdays(sat),rd=null;for(var j=0;j<7;j++){if(dname(ww[j])===h.wday){rd=ww[j];break;}}if(!rd||rd>t){sat=addDays(sat,-7);continue;}if(rd===t&&!isDone(h.id,t)){sat=addDays(sat,-7);continue;}if(isDone(h.id,rd))s++;else break;sat=addDays(sat,-7);}return{v:s,u:'weeks'};}
  return{v:0,u:'days'};
}
function getDayStreak(){
  var t=today();
  var tracked=S.habits.filter(function(h){return!h.arc&&h.type!=='oneTime'&&h.streakReq!==false;});
  if(!tracked.length)return 0;
  var earliest=tracked.reduce(function(m,h){var d=(h.at||'2000').slice(0,10);return d<m?d:m;},'9999');
  function dc(d){var rh=tracked.filter(function(h){return req(h,d);});if(!rh.length)return null;return rh.every(function(h){return isDone(h.id,d);});}
  var s=dc(t)===true?1:0,d=addDays(t,-1);
  while(d>=earliest&&s<9999){var c=dc(d);if(c===null){d=addDays(d,-1);continue;}if(c)s++;else break;d=addDays(d,-1);}
  return s;
}
function timesDone(h){return S.done.filter(function(c){return c.hid===h.id;}).length;}
function totalDur(h){return S.done.filter(function(c){return c.hid===h.id;}).reduce(function(a,c){return a+(c.dur||0);},0);}
function goalPct(h){if(!h.goal)return null;return Math.min(Math.round(timesDone(h)/h.goal*100),100);}
function schedLbl(h){
  var t=h.type==='daily'?'Daily':h.type==='fixed'?(h.days||[]).join(', ')||'Fixed':h.type==='weekly'?'Every '+h.wday:'One-time';
  return t+(h.dur?' · '+fmtDur(h.dur):'');
}
function hIco(h,sz){
  sz=sz||46;var bg=h.color||'#E5E5EA';
  if(h.icon&&h.icon.trim())return'<div class="hico" style="background:'+bg+';width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.52)+'px">'+esc(h.icon)+'</div>';
  var l=((h.title||'?').charAt(0)).toUpperCase();
  return'<div class="hico" style="background:'+bg+';width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.42)+'px;font-weight:800;color:rgba(0,0,0,.35)">'+esc(l)+'</div>';
}

// ── SWIPE TO DELETE ──────────────────────────────────────
function bindSwipe(){
  document.querySelectorAll('#s-habits-body .swrow-inner').forEach(function(row){
    var sx=0,sy=0,tx=0,isV=null,sw=false,REVEAL=86;
    row.addEventListener('touchstart',function(e){
      if(e.target.closest('button'))return;
      sx=e.touches[0].clientX;sy=e.touches[0].clientY;
      tx=sw?-REVEAL:0;isV=null;row.style.transition='none';
    },{passive:true});
    row.addEventListener('touchmove',function(e){
      var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
      if(isV===null)isV=Math.abs(dy)>Math.abs(dx)+5;
      if(isV)return;
      e.preventDefault();
      row.style.transform='translateX('+Math.max(-REVEAL-8,Math.min(0,tx+dx))+'px)';
    },{passive:false});
    row.addEventListener('touchend',function(e){
      if(isV===null||isV)return;
      var dx=e.changedTouches[0].clientX-sx;
      row.style.transition='transform .22s cubic-bezier(.25,.8,.25,1)';
      sw=sw?(tx+dx<-REVEAL/2):(tx+dx<-40);
      row.style.transform=sw?'translateX(-'+REVEAL+'px)':'';
      if(sw)document.querySelectorAll('#s-habits-body .swrow-inner').forEach(function(r){
        if(r!==row){r.style.transition='transform .2s';r.style.transform='';r._sw=false;}
      });
      row._sw=sw;
    },{passive:true});
  });
}

// ── DRAG TO REORDER ──────────────────────────────────────
// Long-press (500ms) activates drag. Scrolling is unaffected until drag starts.
var _dEl=null,_dTimer=null,_dragging=false,_dSX=0,_dSY=0;

function bindDragDrop(){
  var body=document.getElementById('s-habits-body');
  if(!body)return;
  var container=body.querySelector('.list-box');
  if(!container||!container.querySelector('.swrow'))return;
  container.addEventListener('touchstart',_dTS,{passive:true});
  container.addEventListener('touchmove',_dTM,{passive:false});
  container.addEventListener('touchend',_dTE,{passive:true});
  container.addEventListener('touchcancel',_dTE,{passive:true});
}

function _dTS(e){
  if(e.target.closest('button'))return;
  var row=e.target.closest('.swrow');
  if(!row)return;
  _dSX=e.touches[0].clientX;_dSY=e.touches[0].clientY;
  clearTimeout(_dTimer);
  _dTimer=setTimeout(function(){
    _dragging=true;_dEl=row;
    row.style.opacity='0.72';
    row.style.boxShadow='0 8px 28px rgba(0,0,0,.16)';
    row.style.zIndex='20';row.style.position='relative';
    row.style.transform='scale(1.015)';
    row.style.transition='transform .12s,box-shadow .12s,opacity .12s';
    if(navigator.vibrate)navigator.vibrate(18);
  },500);
}

function _dTM(e){
  if(!_dragging){
    // Cancel long-press if finger drifted — scroll works normally
    if(Math.abs(e.touches[0].clientX-_dSX)>8||Math.abs(e.touches[0].clientY-_dSY)>8){
      clearTimeout(_dTimer);_dTimer=null;
    }
    return;
  }
  e.preventDefault(); // Only blocks scroll after 500ms long-press confirmed
  var touch=e.touches[0];
  var under=document.elementFromPoint(touch.clientX,touch.clientY);
  var target=under&&under.closest('.swrow');
  var cont=_dEl&&_dEl.parentElement;
  if(target&&target!==_dEl&&cont&&target.parentElement===cont){
    var r=target.getBoundingClientRect();
    cont.insertBefore(_dEl,touch.clientY>r.top+r.height/2?target.nextSibling:target);
  }
}

function _dTE(){

function buildPickerCol(id,arr,fmt){

  arr.forEach(function(v){html+='<div class="pi">'+fmt(v)+'</div>';});
  html+='<div style="height:'+PPAD+'px"></div>';
  return'<div class="pcol" id="'+id+'">'+html+'</div>';
}
function initPickerCol(id,idx){
  setTimeout(function(){
    var col=document.getElementById(id);if(!col)return;
    col.scrollTop=idx*PIH;
    updatePickerHighlight(id);
    col.addEventListener('scroll',function(){updatePickerHighlight(id);},{passive:true});
  },30);

function updatePickerHighlight(id){
  var col=document.getElementById(id);if(!col)return;

function getPickerVal(id,arr){
  var col=document.getElementById(id);if(!col)return arr[0];

}

function getRangeDates(){var t=today();if(insRange==='7d')return{from:addDays(t,-6),to:t};if(insRange==='30d')return{from:addDays(t,-29),to:t};if(insRange==='week')return{from:wsat(t),to:addDays(wsat(t),6)};if(insRange==='month'){var d=new Date(t+'T12:00:00');return{from:d.getFullYear()+'-'+pad(d.getMonth()+1)+'-01',to:t};}return{from:new Date(t+'T12:00:00').getFullYear()+'-01-01',to:t};}
function datesInRange(f,to){var a=[],d=f;while(d<=to){a.push(d);d=addDays(d,1);}return a;}

  document.getElementById('i-cmp').innerHTML='<div class="cc"><div class="cv">'+pct+'%</div><div class="cl">This period</div><div class="cd">'+ds+'</div></div><div class="cc"><div class="cv">'+pp+'%</div><div class="cl">Prev period</div></div><div class="cc"><div class="cv">'+tM+'</div><div class="cl">Missed</div></div><div class="cc"><div class="cv">'+(tDur?fmtDur(tDur):'—')+'</div><div class="cl">Productive</div></div>';

  var stats=active.map(function(h){var r=0,dn=0;dates.forEach(function(d){if(req(h,d)){r++;if(isDone(h.id,d))dn++;}});return{h:h,r:r,dn:dn,p:r?Math.round(dn/r*100):0};}).filter(function(x){return x.r>0;}).sort(function(a,b){return b.p-a.p;}).slice(0,5);
  document.getElementById('i-rank').innerHTML=stats.length?'<div class="list-box">'+stats.map(function(x,i){return'<div class="rr"><div class="rn">'+(i+1)+'</div><div style="flex:1"><div class="rname">'+(x.h.icon||x.h.title.charAt(0))+' '+esc(x.h.title)+'</div><div class="rsub">'+x.dn+'/'+x.r+' done</div></div><span style="font-size:16px;font-weight:800;color:var(--p)">'+x.p+'%</span></div>';}).join('')+'</div>':'<div style="padding:14px 20px;color:var(--t3);font-size:14px">No data yet</div>';
  var dayN=['Sat','Sun','Mon','Tue','Wed','Thu','Fri'],jsMap=[6,0,1,2,3,4,5];
  var mByD=dayN.map(function(dn,i){var m=0;dates.forEach(function(d){if(new Date(d+'T12:00:00').getDay()===jsMap[i])active.forEach(function(h){if(req(h,d)&&!isDone(h.id,d)&&d<t)m++;});});return{l:dn,c:m};});
  var mxM=Math.max(1,...mByD.map(function(x){return x.c;}));

  var reas={};S.notes.filter(function(n){return n.date>=rng.from&&n.date<=rng.to;}).forEach(function(n){reas[n.cat]=(reas[n.cat]||0)+1;});
  var rarr=Object.entries(reas).sort(function(a,b){return b[1]-a[1];}).slice(0,6);var mxR=Math.max(1,...rarr.map(function(x){return x[1];}));

  var goaled=active.filter(function(h){return h.goal;});
  var bkts=[{l:'0–25%',n:0},{l:'26–50%',n:0},{l:'51–75%',n:0},{l:'76–99%',n:0},{l:'100%',n:0}];
  goaled.forEach(function(h){var p=Math.min(Math.round(timesDone(h)/h.goal*100),100);bkts[p<=25?0:p<=50?1:p<=75?2:p<100?3:4].n++;});
  var mxG=Math.max(1,...bkts.map(function(b){return b.n;}));
  document.getElementById('i-goals').innerHTML=goaled.length?bkts.map(function(b){return'<div class="brow"><div class="bl">'+b.l+'</div><div class="bt"><div class="bf bf-p" style="width:'+Math.max(b.n?Math.round(b.n/mxG*100):0,b.n?4:0)+'%">'+b.n+'</div></div></div>';}).join(''):'<div style="padding:0 0 10px;font-size:14px;color:var(--t3)">No habits with goals</div>';
}

// ── MANAGE CATS ──────────────────────────────────────────
function renderCats(){
  var list=document.getElementById('cats-list');list.innerHTML='';
  S.cats.forEach(function(c){
    var row=document.createElement('div');row.className='mr';
    if(editCatId===c.id){
      row.innerHTML='<input id="ec-'+c.id+'" value="'+esc(c.l)+'" style="flex:1;padding:10px 14px;border-radius:12px;border:2px solid var(--p);font-size:15px;outline:none;font-family:inherit;color:var(--t1)">'+
        '<button onclick="saveCat('+c.id+')" style="padding:10px 16px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-left:8px;font-family:inherit">Save</button>'+
        '<button onclick="editCatId=null;renderCats()" style="background:none;border:none;cursor:pointer;padding:6px 8px;margin-left:2px;display:flex;align-items:center">'+ico('close',18,'var(--t2)')+'</button>';
      setTimeout(function(){var el=document.getElementById('ec-'+c.id);if(el){el.focus();el.select();}},30);
    } else {
      row.innerHTML='<span class="ml">'+esc(c.l)+(c.d?'<span class="mtag">default</span>':'')+'</span>'+
        '<button class="ib" onclick="editCatId='+c.id+';renderCats()">'+ico('edit',18,'var(--p)')+'</button>'+
        (c.d?'<div style="width:32px"></div>':'<button class="ib" onclick="delCat('+c.id+')">'+ico('trash',18,'var(--r)')+'</button>');
    }
    list.appendChild(row);
  });
}
function saveCat(id){var v=(document.getElementById('ec-'+id)||{}).value;v=v?v.trim():'';if(!v){alert('Name required');return;}var c=S.cats.find(function(x){return x.id===id;});if(c)c.l=v;editCatId=null;save();renderCats();}
function delCat(id){if(!confirm('Delete?'))return;S.cats=S.cats.filter(function(c){return c.id!==id;});if(selCat===id)selCat=null;save();renderCats();}
function addCat(){var inp=document.getElementById('new-cat'),v=inp.value.trim();if(!v){alert('Enter a name');return;}if(S.cats.find(function(c){return c.l.toLowerCase()===v.toLowerCase();})){alert('Already exists');return;}var maxId=Math.max(0,...S.cats.map(function(c){return c.id;}));S.cats.push({id:maxId+1,l:v,d:false});inp.value='';save();renderCats();}

// ── INIT ─────────────────────────────────────────────────
go('today');
</script>
</body>
</html>
